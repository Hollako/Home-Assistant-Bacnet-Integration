name: "BACnet Bridge"
version: "0.3.11"
slug: "bacnet_bridge"
description: "Publish selected Home Assistant entities as BACnet/IP objects"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
host_network: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:transit-connection-variant
panel_title: "BACnet Bridge"
panel_admin: false
watchdog: "http://[HOST]:[PORT:8099]/api/health"
options:
  device_instance: 50000
  device_name: "Home Assistant BACnet Bridge"
  bind_address: "10.10.0.250/24"
  log_level: "info"
  enable_writeback: true
  watch_interval_seconds: 0.2
  ha_reconnect_seconds: 5
  ai_start: 6000
  ao_start: 4000
  av_start: 1000
  bi_start: 7000
  bo_start: 3000
  bv_start: 2000
  msv_start: 5000
schema:
  device_instance: "int"
  device_name: "str"
  bind_address: "str"
  log_level: "list(debug|info|warning|error)"
  enable_writeback: "bool"
  watch_interval_seconds: "float"
  ha_reconnect_seconds: "int"
  ai_start: "int"
  ao_start: "int"
  av_start: "int"
  bi_start: "int"
  bo_start: "int"
  bv_start: "int"
  msv_start: "int"
